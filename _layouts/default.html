<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% assign page_description = page.description | default: site.description %}
    <meta name="description" content="{{ page_description | escape }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  </head>
  <body class="{{ page.body_class | default: 'default-page' }}">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="site-background" aria-hidden="true"></div>

    {% include site-header.html %}

    <main id="main-content" tabindex="-1">
      {% if page.full_width %}
        {{ content }}
      {% else %}
        <section class="content-shell">
          <div class="content-card prose">
            {{ content }}
          </div>
        </section>
      {% endif %}
    </main>

    {% include site-footer.html %}
  </body>
</html>
